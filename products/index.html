<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
:root{--fd:'Unbounded',sans-serif;--fu:'Plus Jakarta Sans',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;--es:cubic-bezier(.22,1,.36,1);--eo:cubic-bezier(.4,0,.2,1);--tr:.22s var(--eo);--hh:58px;}
[data-theme="orange"]{--bga:#ff6a00;--bgb:#ff8c2a;--bgc:#ffb870;--bgd:#fff5e6;--panel:rgba(255,255,255,.82);--pb:blur(32px) saturate(220%);--hbg:rgba(255,255,255,.88);--hbl:blur(24px) saturate(200%);--brd:rgba(255,100,0,.22);--bfc:rgba(255,106,0,.55);--tx:#1a0a00;--sb:#4a2000;--mu:#a05820;--ac:#ff6a00;--as:rgba(255,106,0,.09);--sh:0 8px 48px rgba(200,60,0,.14);--sm:0 24px 64px rgba(180,50,0,.20);--gl:rgba(255,106,0,.40);--sp:rgba(255,100,0,.18);--sl:rgba(255,106,0,.14);--o1:rgba(255,106,0,.22);--o2:rgba(255,160,60,.16);--dg:rgba(0,0,0,.04);}
[data-theme="white"]{--bga:#fff;--bgb:#fff;--bgc:#fff;--bgd:#fff;--panel:rgba(255,255,255,.95);--pb:blur(32px);--hbg:rgba(255,255,255,.97);--hbl:blur(24px);--brd:rgba(0,0,0,.10);--bfc:rgba(0,0,0,.40);--tx:#000;--sb:#333;--mu:#888;--ac:#000;--as:rgba(0,0,0,.06);--sh:0 8px 48px rgba(0,0,0,.08);--sm:0 24px 64px rgba(0,0,0,.12);--gl:rgba(0,0,0,.20);--sp:rgba(0,0,0,.09);--sl:rgba(0,0,0,.10);--o1:rgba(0,0,0,.03);--o2:rgba(0,0,0,.02);--dg:rgba(0,0,0,.038);}
[data-theme="dark"]{--bga:#0a0a0a;--bgb:#111;--bgc:#1a1a1a;--bgd:#111;--panel:rgba(255,255,255,.06);--pb:blur(32px) saturate(160%);--hbg:rgba(0,0,0,.92);--hbl:blur(24px);--brd:rgba(255,255,255,.12);--bfc:rgba(255,255,255,.45);--tx:#fff;--sb:#ccc;--mu:#666;--ac:#ff6a00;--as:rgba(255,106,0,.1);--sh:0 8px 48px rgba(0,0,0,.85);--sm:0 24px 64px rgba(0,0,0,.9);--gl:rgba(255,106,0,.3);--sp:rgba(255,255,255,.10);--sl:rgba(255,255,255,.15);--o1:rgba(255,255,255,.04);--o2:rgba(255,255,255,.025);--dg:rgba(255,255,255,.025);}
[data-theme="sky"]{--bga:#3a8fd4;--bgb:#6ab8f0;--bgc:#b0dcff;--bgd:#e8f5ff;--panel:rgba(255,255,255,.80);--pb:blur(32px) saturate(220%);--hbg:rgba(255,255,255,.88);--hbl:blur(24px) saturate(200%);--brd:rgba(90,170,255,.30);--bfc:rgba(26,133,255,.55);--tx:#091e36;--sb:#1e4870;--mu:#5890b8;--ac:#1a85ff;--as:rgba(26,133,255,.09);--sh:0 8px 48px rgba(10,80,200,.12);--sm:0 24px 64px rgba(0,60,180,.18);--gl:rgba(26,133,255,.35);--sp:rgba(90,170,255,.26);--sl:rgba(26,133,255,.18);--o1:rgba(26,133,255,.22);--o2:rgba(100,200,255,.16);--dg:rgba(0,0,0,.04);}
[data-theme="sakura"]{--bga:#f0a0c8;--bgb:#f8d0e8;--bgc:#fff0f8;--bgd:#fffafd;--panel:rgba(255,255,255,.82);--pb:blur(32px) saturate(220%);--hbg:rgba(255,246,252,.92);--hbl:blur(24px) saturate(200%);--brd:rgba(220,80,150,.25);--bfc:rgba(220,60,140,.55);--tx:#240614;--sb:#701838;--mu:#b06080;--ac:#e03070;--as:rgba(224,48,112,.08);--sh:0 8px 48px rgba(180,40,100,.12);--sm:0 24px 64px rgba(160,40,90,.15);--gl:rgba(224,48,112,.32);--sp:rgba(220,80,150,.24);--sl:rgba(224,48,112,.16);--o1:rgba(224,48,112,.20);--o2:rgba(255,160,200,.14);--dg:rgba(0,0,0,.04);}
[data-theme="mint"]{--bga:#78d8a8;--bgb:#b0f0d0;--bgc:#dcfaec;--bgd:#f2fff8;--panel:rgba(255,255,255,.80);--pb:blur(32px) saturate(220%);--hbg:rgba(248,255,252,.92);--hbl:blur(24px) saturate(200%);--brd:rgba(0,170,90,.22);--bfc:rgba(0,160,85,.52);--tx:#031a0e;--sb:#0e5030;--mu:#4aa068;--ac:#00b060;--as:rgba(0,176,96,.08);--sh:0 8px 48px rgba(0,90,50,.10);--sm:0 24px 64px rgba(0,80,45,.14);--gl:rgba(0,176,96,.30);--sp:rgba(0,170,90,.20);--sl:rgba(0,176,96,.16);--o1:rgba(0,176,96,.20);--o2:rgba(80,220,150,.14);--dg:rgba(0,0,0,.04);}
body{font-family:var(--fu);color:var(--tx);background:linear-gradient(158deg,var(--bga) 0%,var(--bgb) 22%,var(--bgc) 60%,var(--bgd) 100%) fixed;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;padding-top:env(safe-area-inset-top);}
::selection{background:var(--sl);}
.pbg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.porb{position:absolute;border-radius:50%;filter:blur(90px);}
.dg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(var(--dg) 1px,transparent 1px);background-size:30px 30px;}
#pb{position:fixed;top:0;left:0;height:2px;z-index:9999;background:var(--ac);box-shadow:0 0 8px var(--gl);width:0;border-radius:0 1px 1px 0;}
/* NAV */
.nav{position:fixed;top:env(safe-area-inset-top);left:0;right:0;z-index:300;height:var(--hh);background:var(--hbg);backdrop-filter:var(--hbl);-webkit-backdrop-filter:var(--hbl);border-bottom:1px solid transparent;display:flex;align-items:center;gap:10px;padding:0 20px;transition:border-color var(--tr),box-shadow var(--tr);}
.nav.sc{border-color:var(--brd);box-shadow:var(--sh);}
.nav-logo{font-family:var(--fd);font-weight:900;font-size:.88rem;letter-spacing:-.03em;color:var(--tx);text-decoration:none;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.logo-pip{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 12px var(--gl);animation:pip 2.8s ease-in-out infinite;}
@keyframes pip{0%,100%{box-shadow:0 0 12px var(--gl),0 0 24px var(--as);}50%{box-shadow:0 0 4px var(--gl);}}
.nav-links{display:flex;gap:4px;list-style:none;margin-left:12px;}
.nav-links a{font-size:.72rem;font-weight:600;letter-spacing:.04em;color:var(--sb);text-decoration:none;padding:6px 12px;border-radius:8px;transition:all var(--tr);}
.nav-links a:hover,.nav-links a.active{background:var(--as);color:var(--ac);}
.hs{flex:1;}
.nav-ctrls{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ts{display:flex;gap:5px;}
.tp{width:19px;height:19px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform var(--tr),border-color var(--tr);}
.tp:hover{transform:scale(1.2);}
.tp.active{border-color:var(--tx);}
.lbtn{display:flex;align-items:center;gap:5px;font-family:var(--fm);font-size:.62rem;font-weight:500;color:var(--sb);background:var(--panel);backdrop-filter:var(--pb);border:1px solid var(--brd);border-radius:99px;padding:6px 11px;cursor:pointer;transition:all var(--tr);}
.lbtn:hover{border-color:var(--bfc);color:var(--ac);}
.lcaret{font-size:.48rem;opacity:.55;}
.ldd{position:fixed;top:calc(var(--hh) + 6px);right:20px;background:var(--panel);backdrop-filter:blur(32px);border:1px solid var(--brd);border-radius:18px;padding:8px;box-shadow:var(--sm);display:none;z-index:400;min-width:190px;}
.ldd.open{display:block;animation:ddin .2s var(--es) forwards;}
@keyframes ddin{from{opacity:0;transform:translateY(-8px) scale(.97);}to{opacity:1;transform:none;}}
.lopt{display:flex;align-items:center;gap:10px;font-size:.78rem;font-weight:500;color:var(--sb);padding:9px 12px;border-radius:10px;cursor:pointer;transition:background var(--tr),color var(--tr);}
.lopt:hover{background:var(--as);color:var(--ac);}
.lopt.active{color:var(--ac);font-weight:700;}
.nav-cta{font-size:.72rem;font-weight:700;letter-spacing:.04em;color:#fff;background:var(--ac);padding:9px 18px;border-radius:99px;text-decoration:none;box-shadow:0 2px 12px var(--gl);transition:box-shadow var(--tr),transform var(--tr),filter var(--tr);}
.nav-cta:hover{box-shadow:0 5px 24px var(--gl);transform:translateY(-1px);filter:brightness(1.07);}
.nav-login{display:flex;align-items:center;gap:6px;font-size:.72rem;font-weight:700;color:var(--sb);background:var(--panel);backdrop-filter:var(--pb);border:1px solid var(--brd);padding:8px 15px;border-radius:99px;text-decoration:none;transition:all var(--tr);}
.nav-login:hover{border-color:var(--bfc);color:var(--ac);}
.nav-login svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.nav-user{display:none;align-items:center;gap:7px;cursor:pointer;padding:5px 12px 5px 5px;border-radius:99px;border:1px solid var(--brd);background:var(--panel);transition:border-color var(--tr);}
.nav-user:hover{border-color:var(--bfc);}
.nav-user-av{width:26px;height:26px;border-radius:50%;overflow:hidden;background:var(--as);}
.nav-user-av img{width:100%;height:100%;object-fit:cover;}
.nav-ham{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;background:none;border:none;color:var(--sb);}
.nav-ham span{display:block;width:20px;height:2px;border-radius:2px;background:currentColor;}
.nav-drawer{display:none;position:fixed;top:var(--hh);left:0;right:0;z-index:290;background:var(--hbg);backdrop-filter:var(--hbl);border-bottom:1px solid var(--brd);flex-direction:column;gap:4px;padding:12px 20px 20px;}
.nav-drawer.open{display:flex;animation:drin .2s var(--es) forwards;}
@keyframes drin{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:none;}}
.nav-drawer a{font-size:.85rem;font-weight:600;color:var(--sb);text-decoration:none;padding:11px 14px;border-radius:10px;transition:all var(--tr);}
.nav-drawer a:hover{background:var(--as);color:var(--ac);}
/* PAGE HERO */
.hero{position:relative;z-index:1;padding:calc(var(--hh) + 64px) 28px 56px;text-align:center;max-width:1100px;margin:0 auto;}
.eyebrow{font-family:var(--fm);font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:var(--ac);margin-bottom:14px;opacity:0;animation:up .7s var(--es) .1s forwards;}
.pg-title{font-family:var(--fd);font-weight:900;font-size:clamp(2.2rem,6vw,4.2rem);letter-spacing:-.05em;line-height:.94;color:var(--tx);margin-bottom:16px;opacity:0;animation:up .9s var(--es) .22s forwards;}
.pg-sub{font-size:.88rem;color:var(--mu);max-width:440px;margin:0 auto;line-height:1.75;opacity:0;animation:up .8s var(--es) .36s forwards;}
@keyframes up{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:none;}}
/* PRODUCT GRID */
.section{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 24px 100px;}
.pgrid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(min(100%,260px),1fr));}

/* PRODUCT CARD */
.pcard{position:relative;overflow:hidden;background:var(--panel);backdrop-filter:var(--pb);-webkit-backdrop-filter:var(--pb);border:1px solid var(--brd);border-radius:20px;padding:0;display:flex;flex-direction:column;text-decoration:none;color:inherit;transition:border-color var(--tr),box-shadow var(--tr),transform .4s var(--es);min-height:280px;}
.pcard::before{content:'';position:absolute;inset:0;border-radius:20px;background:radial-gradient(circle at top left,var(--card-glow,transparent),transparent 55%);opacity:0;transition:opacity .4s;pointer-events:none;z-index:0;}
.pcard:hover{border-color:var(--bfc);box-shadow:var(--sm);transform:translateY(-7px) scale(1.01);}
.pcard:hover::before{opacity:1;}
.pcard.feat{grid-column:span 2;}

/* SCREENSHOT AREA */
.pc-ss{position:relative;width:100%;height:160px;overflow:hidden;border-radius:18px 18px 0 0;background:var(--as);flex-shrink:0;}
.pcard.feat .pc-ss{height:220px;}
.pc-ss img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;transition:transform .6s var(--es);}
.pcard:hover .pc-ss img{transform:scale(1.04) translateY(-4px);}
.pc-ss-loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--as);}
.pc-ss-loader .spin{width:20px;height:20px;border:2px solid var(--brd);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.pc-ss-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.pc-ss-icon svg{width:40px;height:40px;opacity:.18;}

/* CARD BODY */
.pc-body{padding:18px 20px 16px;display:flex;flex-direction:column;flex:1;position:relative;z-index:1;}
.pc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.pc-badge{font-family:var(--fm);font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--mu);background:var(--as);border:1px solid var(--brd);padding:4px 10px;border-radius:99px;}
.pc-arr{font-size:.9rem;color:var(--mu);transition:transform .3s var(--es),color var(--tr);}
.pcard:hover .pc-arr{transform:translate(5px,-5px);color:var(--card-ac,var(--ac));}
.pc-name{font-family:var(--fd);font-weight:800;font-size:1.45rem;letter-spacing:-.05em;line-height:1;margin-bottom:8px;}
.pc-desc{font-size:.82rem;color:var(--mu);line-height:1.65;flex:1;margin-bottom:14px;}
.pc-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.pc-tags{display:flex;flex-wrap:wrap;gap:4px;}
.pc-tag{font-family:var(--fm);font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:99px;border:1px solid;opacity:.75;}
.pc-cta{font-size:.75rem;font-weight:700;color:#fff;padding:8px 18px;border-radius:99px;display:inline-flex;align-items:center;gap:6px;box-shadow:0 2px 10px var(--card-gl,var(--gl));transition:transform .2s var(--es),filter .15s;white-space:nowrap;}
.pcard:hover .pc-cta{transform:translateY(-1px);filter:brightness(1.08);}
.pc-bar{position:absolute;bottom:0;left:0;right:0;height:2.5px;transform:scaleX(0);transform-origin:left;transition:transform .4s var(--es);opacity:.8;}
.pcard:hover .pc-bar{transform:scaleX(1);}

/* LIVE BADGE */
.pc-live{position:absolute;top:10px;right:10px;z-index:2;display:flex;align-items:center;gap:4px;font-family:var(--fm);font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);padding:4px 9px;border-radius:99px;}
.pc-live-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;animation:ldot 1.8s ease-in-out infinite;}
@keyframes ldot{0%,100%{opacity:1;}50%{opacity:.35;}}

/* REVEAL */
.reveal{opacity:0;transform:translateY(28px) scale(.98);transition:opacity .7s var(--es),transform .7s var(--es);}
.reveal.vis{opacity:1;transform:none;}

/* FOOTER */
.footer{position:relative;z-index:1;background:var(--panel);backdrop-filter:var(--pb);border-top:1px solid var(--brd);padding:48px 28px 36px;}
.fi{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1.5fr repeat(3,1fr);gap:40px;}
.fb-name{font-family:var(--fd);font-weight:900;font-size:1.3rem;letter-spacing:-.04em;color:var(--tx);margin-bottom:8px;}
.fb-name .fa{color:var(--ac);}
.fb-desc{font-size:.8rem;color:var(--mu);line-height:1.7;max-width:240px;margin-bottom:16px;}
.fc-ttl{font-family:var(--fm);font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--mu);margin-bottom:14px;}
.fc ul{list-style:none;display:flex;flex-direction:column;gap:8px;}
.fc li a{font-size:.8rem;color:var(--sb);text-decoration:none;transition:color var(--tr);}
.fc li a:hover{color:var(--ac);}
.fb{max-width:1100px;margin:28px auto 0;border-top:1px solid var(--sp);padding-top:22px;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;}
.fc-py{font-family:var(--fm);font-size:.58rem;letter-spacing:.1em;color:var(--mu);}
.fc-lg{display:flex;gap:14px;}
.fc-lg a{font-size:.7rem;color:var(--mu);text-decoration:none;transition:color var(--tr);}
.fc-lg a:hover{color:var(--ac);}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);z-index:9998;font-family:var(--fm);font-size:.62rem;letter-spacing:.1em;color:var(--sb);background:var(--panel);backdrop-filter:var(--pb);border:1px solid var(--brd);border-radius:99px;padding:9px 22px;box-shadow:var(--sh);opacity:0;transition:opacity .3s,transform .3s var(--es);white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:900px){.fi{grid-template-columns:1fr 1fr;}.pcard.feat{grid-column:span 1;}}
@media(max-width:640px){.nav-links,.nav-cta{display:none;}.nav-ham{display:flex;}.fi{grid-template-columns:1fr;}.fb{flex-direction:column;gap:12px;text-align:center;}}
/* ── DONATE BANNER ── */
.donate-banner{
  grid-column:1/-1;
  position:relative;overflow:hidden;border-radius:20px;
  background:linear-gradient(135deg,var(--donate-g1,#ff6a00),var(--donate-g2,#ff9d50));
  padding:0;cursor:pointer;border:none;width:100%;
  display:block;text-decoration:none;
  transition:transform .3s var(--es),filter .22s;
  animation:up .7s var(--es) .5s both;
}
[data-theme="orange"]{--donate-g1:#ff6a00;--donate-g2:#ff9d50;}
[data-theme="white"] {--donate-g1:#111;--donate-g2:#444;}
[data-theme="dark"]  {--donate-g1:#6c63ff;--donate-g2:#a78bfa;}
[data-theme="sky"]   {--donate-g1:#1a85ff;--donate-g2:#60b8ff;}
[data-theme="sakura"]{--donate-g1:#e03070;--donate-g2:#f880b0;}
[data-theme="mint"]  {--donate-g1:#00b060;--donate-g2:#50e090;}
.donate-banner:hover{transform:translateY(-4px) scale(1.01);filter:brightness(1.08);}
.donate-banner:active{transform:scale(.98);}
.db-shimmer{position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.16) 50%,transparent 60%);background-size:200% 100%;animation:dbs 3s ease-in-out infinite;pointer-events:none;}
@keyframes dbs{0%,100%{background-position:200% 0;}50%{background-position:-200% 0;}}
.db-inner{padding:22px 24px;display:flex;align-items:center;gap:16px;position:relative;z-index:1;}
.db-heart{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.32);display:flex;align-items:center;justify-content:center;flex-shrink:0;animation:hb 2.2s ease-in-out infinite;}
@keyframes hb{0%,100%{transform:scale(1);}14%{transform:scale(1.15);}28%{transform:scale(1.05);}42%{transform:scale(1.1);}70%{transform:scale(1);}}
.db-heart svg{width:20px;height:20px;fill:#fff;}
.db-copy{flex:1;}
.db-ttl{font-family:var(--fd);font-weight:900;font-size:.95rem;letter-spacing:-.03em;color:#fff;}
.db-sub{font-size:.72rem;color:rgba(255,255,255,.78);margin-top:3px;line-height:1.4;}
.db-cta{font-family:var(--fd);font-weight:900;font-size:.72rem;letter-spacing:-.01em;color:#fff;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.45);padding:10px 20px;border-radius:99px;white-space:nowrap;flex-shrink:0;transition:background .2s,border-color .2s;}
.donate-banner:hover .db-cta{background:rgba(255,255,255,.32);border-color:rgba(255,255,255,.7);}
@media(max-width:540px){
  .db-inner{flex-wrap:wrap;gap:12px;}
  .db-cta{width:100%;text-align:center;}
}

/* ── RESPONSIVE FIXES ── */
@media(max-width:480px){
  .hero{padding:calc(var(--hh) + 36px) 16px 36px;}
  .pg-title{font-size:clamp(1.8rem,8vw,2.8rem);}
  .section{padding:0 14px 60px;}
  .pgrid{gap:10px;}
}
@media(max-width:360px){
  .pcard.feat{grid-column:span 1;}
  .pc-body{padding:14px 14px 12px;}
}

</style>
</head>
<body>
<div id="pb"></div>
<div class="pbg">
  <div class="porb" style="width:600px;height:600px;top:-10%;left:-15%;background:var(--o1);"></div>
  <div class="porb" style="width:500px;height:500px;bottom:-10%;right:-10%;background:var(--o2);"></div>
</div>
<div class="dg"></div>
<div class="ldd" id="ldd"></div>
<nav class="nav" id="nav">
  <a href="/" class="nav-logo"><div class="logo-pip"></div>Cobinar</a>
  <ul class="nav-links" id="navLinks">
    <li><a href="/products" class="active">Products</a></li>
    <li><a href="/profile">Profile</a></li>
    <li><a href="/about">About</a></li>
  </ul>
  <div class="hs"></div>
  <div class="nav-ctrls">
    <div class="ts" id="ts"></div>
    <button class="lbtn" id="lbtn"><span id="lf">🇭🇹</span><span id="lc">HT</span><span class="lcaret">▾</span></button>
    <div class="nav-user" id="navUser">
      <div class="nav-user-av"><img id="navUserImg" src="" alt=""/></div>
    </div>
    <a href="/login" class="nav-login" id="navLogin">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Sign in
    </a>
    <a href="https://binaris.cobinar.com" class="nav-cta">Launch Binaris</a>
  </div>
  <button class="nav-ham" id="nh" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>
<div class="nav-drawer" id="nd">
  <a href="/products">Products</a>
  <a href="/profile">Profile</a>
  <a href="/about">About</a>
  <a href="/login" id="ndLogin">Sign in</a>
</div>

<div class="hero">
  <div class="eyebrow">Cobinar Ecosystem</div>
  <h1 class="pg-title">Our Products</h1>
  <p class="pg-sub" id="pgSub">Intelligence, commerce, and infrastructure — every tool built with neo-minimalist precision.</p>
</div>

<div class="section">
  <div class="pgrid" id="grid">
    <!-- Cards injected by JS -->
    <div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;padding:60px;color:var(--mu);font-family:var(--fm);font-size:.72rem;letter-spacing:.1em;" id="loadingState">
      <div class="spin" style="width:22px;height:22px;border:2px solid var(--brd);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;margin-right:12px;"></div>
      Loading products…
    </div>
  </div>
</div>

<footer class="footer">
  <div class="fi" id="fi"></div>
  <div class="fb"><p class="fc-py" id="fpy"></p><nav class="fc-lg" id="flg"></nav></div>
</footer>
<div class="toast" id="toast"></div>

<script type="module">
import { PRODUCTS } from './js/_manifest.js';

const $ = id => document.getElementById(id);
const LANGS_MINI = {ht:'🇭🇹',en:'🇺🇸',fr:'🇫🇷',es:'🇪🇸',pt:'🇧🇷',zh:'🇨🇳',ar:'🇸🇦'};
const THEMES = {orange:'#ff6a00',white:'#ffffff',dark:'#000000',sky:'#a8d8ff',sakura:'#ffb8d8',mint:'#90ddb0'};
const THEME_BG = [{id:'orange',bg:'#ff6a00'},{id:'white',bg:'#fff'},{id:'dark',bg:'#000'},{id:'sky',bg:'#5ba8e0'},{id:'sakura',bg:'#f8b8d8'},{id:'mint',bg:'#90e8c0'}];
let curLang = localStorage.getItem('cobinar-lang') || 'ht';

/* Theme */
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const color = THEMES[t] || '#ff6a00';
  ['metaTheme','metaThemeLight','metaThemeDark'].forEach(id => {
    const m = document.getElementById(id); if (m) m.content = color;
  });
  const ab = document.getElementById('metaAppleBar');
  if (ab) ab.content = t === 'dark' ? 'black' : 'black-translucent';
  const cs = document.getElementById('metaColorScheme');
  if (cs) cs.content = t === 'dark' ? 'dark' : 'light dark';
  document.querySelectorAll('.tp').forEach(p => p.classList.toggle('active', p.dataset.t === t));
  localStorage.setItem('cobinar-theme', t);
}
const saved = localStorage.getItem('cobinar-theme');
applyTheme(saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'orange'));
THEME_BG.forEach(t => {
  const b = document.createElement('button'); b.className = 'tp'; b.title = t.id; b.dataset.t = t.id; b.style.background = t.bg;
  if (t.id === 'dark') b.style.boxShadow = 'inset 0 0 0 1.5px rgba(255,255,255,.35)';
  if (t.id === 'white') b.style.boxShadow = 'inset 0 0 0 1.5px rgba(0,0,0,.18)';
  b.addEventListener('click', () => applyTheme(t.id)); $('ts').appendChild(b);
});

/* Lang dropdown */
const ldd = $('ldd');
Object.entries(LANGS_MINI).forEach(([code, flag]) => {
  const o = document.createElement('div'); o.className = 'lopt'; o.dataset.lang = code;
  o.innerHTML = `<span>${flag}</span><span style="font-size:.78rem">${code.toUpperCase()}</span>`;
  o.addEventListener('click', () => { curLang = code; $('lf').textContent = flag; $('lc').textContent = code.toUpperCase(); ldd.classList.remove('open'); localStorage.setItem('cobinar-lang', code); });
  ldd.appendChild(o);
});
$('lbtn').addEventListener('click', e => { e.stopPropagation(); ldd.classList.toggle('open'); });
document.addEventListener('click', () => ldd.classList.remove('open'));

/* Nav ham */
let dOpen = false;
$('nh').addEventListener('click', () => { dOpen = !dOpen; $('nd').classList.toggle('open', dOpen); });
window.addEventListener('scroll', () => $('nav').classList.toggle('sc', window.scrollY > 30), { passive: true });
window.addEventListener('scroll', () => { const m = document.body.scrollHeight - window.innerHeight; $('pb').style.width = (window.scrollY / (m || 1) * 100) + '%'; }, { passive: true });

/* Auth — read from sessionStorage (fast) then localStorage (cross-page) */
function loadUser() {
  let email = sessionStorage.getItem('cobinar-user-email');
  let photo = sessionStorage.getItem('cobinar-user-photo');
  if (!email) {
    try {
      const raw = localStorage.getItem('cobinar-user');
      if (raw) { const u = JSON.parse(raw); email = u?.email; photo = u?.photo || ''; }
    } catch(_) {}
  }
  if (email) {
    $('navLogin').style.display = 'none';
    $('ndLogin').textContent = 'My Account';
    const nu = $('navUser'); nu.style.display = 'flex';
    if (photo) $('navUserImg').src = photo;
    nu.addEventListener('click', () => { location.href = '/login'; });
  }
}
loadUser();

/* Microlink screenshot URL */
function mlUrl(url) {
  return `https://api.microlink.io/?url=${encodeURIComponent(url)}&screenshot=true&meta=false&embed=screenshot.url`;
}

/* Hex → rgb */
function hexRgb(h) {
  const r = parseInt(h.slice(1, 3), 16), g = parseInt(h.slice(3, 5), 16), b = parseInt(h.slice(5, 7), 16);
  return `${r},${g},${b}`;
}

/* Load & render products */
async function loadProducts() {
  const isMobile = window.innerWidth <= 640;
  const modules = await Promise.all(PRODUCTS.map(f => import(`./js/${f}`)));
  const products = modules.map(m => m.default);

  $('loadingState').remove();

  products.forEach((p, i) => {
    const rgb = hexRgb(p.accent || '#ff6a00');
    const isFeat = p.featured && !isMobile;
    const card = document.createElement('a');
    card.href = p.link;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    card.className = 'pcard reveal' + (isFeat ? ' feat' : '');
    card.style.cssText = `--card-glow:rgba(${rgb},.1);--card-ac:${p.accent};--card-gl:rgba(${rgb},.45);`;

    /* Screenshot section */
    let ssHTML = '';
    if (p.screenshot) {
      ssHTML = `
        <div class="pc-ss">
          <div class="pc-ss-loader" id="ssl-${i}"><div class="spin"></div></div>
          <img id="ssi-${i}" src="" alt="${p.name} screenshot" style="display:none;"
               onload="this.style.display='block';document.getElementById('ssl-${i}').remove();"
               onerror="this.closest('.pc-ss').querySelector('.pc-ss-loader').innerHTML='<div class=pc-ss-icon><svg viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1.5\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'3\\'/>\\<circle cx=\\'8.5\\' cy=\\'8.5\\' r=\\'1.5\\'/>\\<polyline points=\\'21 15 16 10 5 21\\'/></svg></div>';"/>
          <div class="pc-live"><div class="pc-live-dot"></div>Live</div>
        </div>`;
    } else {
      ssHTML = `<div class="pc-ss"><div class="pc-ss-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--card-ac)"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div></div>`;
    }

    const tagsHTML = (p.tags || []).map(t => `<span class="pc-tag" style="color:${p.accent};border-color:rgba(${rgb},.3);background:rgba(${rgb},.07)">${t}</span>`).join('');

    card.innerHTML = `
      ${ssHTML}
      <div class="pc-body">
        <div class="pc-top">
          <span class="pc-badge">${p.category || ''}</span>
          <span class="pc-arr" aria-hidden="true">↗</span>
        </div>
        <div class="pc-name" style="color:${p.accent}">${p.name}</div>
        <p class="pc-desc">${p.description}</p>
        <div class="pc-foot">
          <div class="pc-tags">${tagsHTML}</div>
          <div class="pc-cta" style="background:${p.accent}">${p.cta || 'Visit'} →</div>
        </div>
      </div>
      <div class="pc-bar" style="background:${p.accent}"></div>`;

    $('grid').appendChild(card);

    /* Lazy-load screenshot via Microlink */
    if (p.screenshot) {
      fetch(mlUrl(p.link))
        .then(r => r.json())
        .then(d => {
          const url = d?.data?.screenshot?.url;
          const img = document.getElementById(`ssi-${i}`);
          if (img && url) img.src = url;
        })
        .catch(() => {});
    }
  });

  /* Reveal */
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if (!e.isIntersecting) return; setTimeout(() => e.target.classList.add('vis'), Number(e.target.dataset.d || 0)); io.unobserve(e.target); });
  }, { threshold: .07 });
  document.querySelectorAll('.reveal').forEach((el, i) => { el.dataset.d = i * 80; io.observe(el); });

  /* Donate banner — inject at end of product grid */
  const donateBanner = document.createElement('a');
  donateBanner.href = 'https://payments.cobinar.com/?label=Support+Cobinar&desc=Help+us+keep+building+amazing+tools&donate=1';
  donateBanner.target = '_blank';
  donateBanner.rel = 'noopener noreferrer';
  donateBanner.className = 'donate-banner reveal';
  donateBanner.setAttribute('aria-label', 'Help us keep building — donate to Cobinar');
  donateBanner.innerHTML = `
    <div class="db-shimmer"></div>
    <div class="db-inner">
      <div class="db-heart">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </div>
      <div class="db-copy">
        <div class="db-ttl">Help us keep building</div>
        <div class="db-sub">Love what Cobinar builds? Your support fuels new products, features &amp; tools for everyone.</div>
      </div>
      <div class="db-cta">Support Cobinar ♥</div>
    </div>`;
  $('grid').appendChild(donateBanner);

  /* Footer */
  $('fi').innerHTML = `
    <div><div class="fb-name">Cobin<span class="fa">ar</span></div><p class="fb-desc">The Ecosystem. Reimagined. Built by Cobernal Systems.</p></div>
    <div class="fc"><p class="fc-ttl">Products</p><ul>${products.map(p => `<li><a href="${p.link}" target="_blank" rel="noopener">${p.name}</a></li>`).join('')}</ul></div>
    <div class="fc"><p class="fc-ttl">Company</p><ul><li><a href="/about">About</a></li><li><a href="https://hub.cobinar.com">Blog</a></li></ul></div>
    <div class="fc"><p class="fc-ttl">Legal</p><ul><li><a href="/privacy">Privacy</a></li><li><a href="/terms">Terms</a></li></ul></div>`;
  $('fpy').textContent = '© 2025 Cobernal Systems. All rights reserved.';
  $('flg').innerHTML = '<a href="/privacy">Privacy</a><a href="/terms">Terms</a><a href="/about">About</a>';
}

loadProducts();
</script>
</body>
</html>
