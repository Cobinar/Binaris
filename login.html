<!DOCTYPE html>
<html lang="en" data-theme="orange">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Sign in — Cobinar</title>
<meta name="robots" content="noindex"/>
<meta name="theme-color" id="metaTheme" content="#ff6a00"/>
<meta name="theme-color" media="(prefers-color-scheme: light)" id="metaThemeLight" content="#ff6a00"/>
<meta name="theme-color" media="(prefers-color-scheme: dark)"  id="metaThemeDark"  content="#000000"/>
<meta name="color-scheme" content="light dark"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="icon" type="image/png" href="/icons/cobinar-64.png"/>
<link rel="apple-touch-icon" href="/icons/cobinar-180.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
:root{
  --orange:#ff6a00;--orange-deep:#cc4400;--orange-soft:rgba(255,106,0,.12);
  --glow:rgba(255,106,0,.5);--gold:#f5c518;
  --ease:cubic-bezier(.22,1,.36,1);
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --display:'Unbounded',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
body{
  font-family:var(--font);
  background:linear-gradient(145deg,#1a0500 0%,#2d0c00 30%,#ff4500 70%,#ff6a00 85%,#ffb870 100%);
  min-height:100vh;min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  padding:20px;padding-top:max(20px,env(safe-area-inset-top));
  position:relative;overflow:hidden;
}

/* ── BACKGROUND ORBS ── */
.bg-orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(80px);}
.orb1{width:600px;height:600px;top:-20%;left:-20%;background:rgba(255,80,0,.25);animation:drift1 12s ease-in-out infinite;}
.orb2{width:500px;height:500px;bottom:-15%;right:-15%;background:rgba(255,160,60,.2);animation:drift2 15s ease-in-out infinite;}
.orb3{width:300px;height:300px;top:40%;left:40%;background:rgba(255,200,100,.15);animation:drift1 10s ease-in-out infinite reverse;}
@keyframes drift1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(40px,-30px) scale(1.08);}}
@keyframes drift2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-30px,40px) scale(1.06);}}

/* Grid pattern */
.bg-grid{
  position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:44px 44px;
}

/* ── CARD ── */
.card{
  position:relative;z-index:10;
  width:100%;max-width:420px;
  background:rgba(255,255,255,.07);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border:1px solid rgba(255,255,255,.18);
  border-radius:28px;
  padding:44px 40px 40px;
  box-shadow:
    0 40px 100px rgba(0,0,0,.4),
    0 0 0 1px rgba(255,255,255,.06) inset,
    0 1px 0 rgba(255,255,255,.2) inset;
  animation:cardIn .7s var(--ease) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(40px) scale(.96);}to{opacity:1;transform:none;}}

/* ── LOGO ── */
.logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:36px;gap:16px;}
.logo-icon{
  width:72px;height:72px;border-radius:20px;
  background:rgba(255,255,255,.12);
  border:1.5px solid rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 32px rgba(0,0,0,.25),0 0 0 8px rgba(255,106,0,.08);
  animation:logoFloat 3s ease-in-out infinite;
  overflow:hidden;
  position:relative;
}
.logo-icon::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.2) 0%,transparent 60%);
  border-radius:inherit;
}
.logo-icon img{width:52px;height:52px;object-fit:contain;border-radius:12px;position:relative;z-index:1;}
.logo-icon svg{width:36px;height:36px;stroke:rgba(255,255,255,.9);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;position:relative;z-index:1;}
@keyframes logoFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}

.logo-text{text-align:center;}
.logo-name{
  font-family:var(--display);font-weight:900;
  font-size:1.6rem;letter-spacing:-.04em;
  color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,.3);
}
.logo-welcome{
  font-size:.8rem;color:rgba(255,255,255,.65);
  font-weight:500;letter-spacing:.02em;
  margin-top:3px;
}

/* ── DIVIDER ── */
.divider{
  display:flex;align-items:center;gap:14px;
  margin:0 0 28px;
}
.divider-line{flex:1;height:1px;background:rgba(255,255,255,.15);}
.divider-label{font-family:var(--mono);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);}

/* ── GOOGLE BUTTON ── */
.btn-google{
  width:100%;display:flex;align-items:center;justify-content:center;gap:12px;
  padding:16px 24px;border-radius:16px;
  background:#fff;
  border:none;cursor:pointer;
  font-family:var(--font);font-size:.9rem;font-weight:700;
  color:#1a1a1a;letter-spacing:-.01em;
  box-shadow:0 4px 24px rgba(0,0,0,.25),0 1px 0 rgba(255,255,255,.5) inset;
  transition:transform .2s var(--ease),box-shadow .2s,filter .2s;
  position:relative;overflow:hidden;
}
.btn-google::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(165deg,rgba(255,255,255,.4) 0%,transparent 50%);
}
.btn-google:hover{transform:translateY(-2px) scale(1.01);box-shadow:0 8px 36px rgba(0,0,0,.3),0 1px 0 rgba(255,255,255,.5) inset;filter:brightness(1.02);}
.btn-google:active{transform:translateY(0) scale(.98);transition-duration:.08s;}
.btn-google:disabled{opacity:.65;cursor:not-allowed;transform:none;}
.google-icon{width:20px;height:20px;flex-shrink:0;}

/* ── GUEST BUTTON ── */
.btn-guest{
  width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  padding:14px 24px;border-radius:16px;margin-top:10px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.16);cursor:pointer;
  font-family:var(--font);font-size:.82rem;font-weight:600;
  color:rgba(255,255,255,.8);letter-spacing:-.01em;
  transition:background .2s,border-color .2s,color .2s,transform .2s var(--ease);
}
.btn-guest:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.3);color:#fff;transform:translateY(-1px);}
.btn-guest:active{transform:translateY(0);transition-duration:.08s;}

/* ── SPINNER ── */
.spinner{
  width:18px;height:18px;border-radius:50%;
  border:2px solid rgba(255,106,0,.3);
  border-top-color:#ff6a00;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── STATUS MESSAGES ── */
.status-msg{
  margin-top:16px;padding:12px 16px;border-radius:12px;
  font-size:.8rem;font-weight:600;
  display:none;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}
.status-msg.error{background:rgba(220,36,94,.15);border:1px solid rgba(220,36,94,.35);color:#ff6b9d;}
.status-msg.success{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#6bffb8;}
.status-msg.info{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);color:rgba(255,255,255,.7);}

/* ── LOGGED IN STATE ── */
.logged-in{display:none;flex-direction:column;align-items:center;gap:16px;text-align:center;}
.user-avatar{width:64px;height:64px;border-radius:50%;border:3px solid rgba(255,255,255,.3);overflow:hidden;background:rgba(255,255,255,.1);}
.user-avatar img{width:100%;height:100%;object-fit:cover;}
.user-name{font-size:1rem;font-weight:700;color:#fff;letter-spacing:-.01em;}
.user-email{font-size:.78rem;color:rgba(255,255,255,.55);font-family:var(--mono);}
.admin-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,106,0,.2);border:1px solid rgba(255,106,0,.45);
  color:#ffb870;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:5px 12px;border-radius:99px;margin-top:4px;
}
.btn-continue{
  width:100%;padding:14px;border-radius:14px;
  background:var(--orange);color:#fff;
  border:none;cursor:pointer;font-family:var(--font);font-size:.88rem;font-weight:700;
  box-shadow:0 4px 20px rgba(255,106,0,.4);
  transition:transform .2s var(--ease),box-shadow .2s,filter .2s;
  margin-top:4px;
}
.btn-continue:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,106,0,.5);filter:brightness(1.07);}
.btn-signout{
  font-size:.75rem;color:rgba(255,255,255,.45);background:none;border:none;
  cursor:pointer;padding:6px 12px;font-family:var(--font);font-weight:600;
  transition:color .15s;text-decoration:underline;text-underline-offset:3px;
}
.btn-signout:hover{color:rgba(255,255,255,.7);}

/* ── FOOTER TEXT ── */
.card-footer{
  margin-top:28px;text-align:center;
  font-size:.7rem;color:rgba(255,255,255,.38);
  line-height:1.6;
}
.card-footer a{color:rgba(255,255,255,.55);text-decoration:none;}
.card-footer a:hover{color:rgba(255,255,255,.8);}

/* ── BACK LINK ── */
.back-link{
  position:fixed;top:max(20px,env(safe-area-inset-top));left:20px;
  display:flex;align-items:center;gap:8px;
  font-size:.75rem;font-weight:600;color:rgba(255,255,255,.55);
  text-decoration:none;z-index:20;
  transition:color .15s;
}
.back-link:hover{color:rgba(255,255,255,.9);}
.back-link svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .card{padding:36px 24px 32px;border-radius:22px;}
  .logo-name{font-size:1.35rem;}
}
@media(max-height:600px){
  .card{padding:28px 32px 28px;}
  .logo-wrap{margin-bottom:24px;gap:12px;}
  .logo-icon{width:56px;height:56px;border-radius:16px;}
}
</style>
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>
<div class="bg-grid"></div>

<a href="/" class="back-link" aria-label="Back to home">
  <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  Cobinar
</a>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon" id="logoIcon">
      <!-- Real Cobinar app icon -->
      <img src="/icons/cobinar-512.png" alt="Cobinar"
           onerror="this.onerror=null;this.src='/icons/cobinar-192.png'"
           style="display:block;width:52px;height:52px;object-fit:contain;border-radius:12px;position:relative;z-index:1;"/>
    </div>
    <div class="logo-text">
      <div class="logo-name">Cobinar</div>
      <div class="logo-welcome">Welcome back</div>
    </div>
  </div>

  <!-- DEFAULT SIGN-IN VIEW -->
  <div id="signInView">
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-label">Sign in to continue</span>
      <div class="divider-line"></div>
    </div>

    <button class="btn-google" id="btnGoogle" aria-label="Sign in with Google">
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span id="googleBtnText">Continue with Google</span>
    </button>

    <button class="btn-guest" id="btnGuest">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Continue as guest
    </button>

    <div class="status-msg" id="statusMsg"></div>
  </div>

  <!-- LOGGED-IN VIEW (shown after sign-in) -->
  <div class="logged-in" id="loggedInView">
    <div class="user-avatar" id="userAvatar">
      <img id="userAvatarImg" src="" alt=""/>
    </div>
    <div>
      <div class="user-name" id="userName"></div>
      <div class="user-email" id="userEmail"></div>
      <div class="admin-badge" id="adminBadge" style="display:none;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Admin
      </div>
    </div>
    <button class="btn-continue" id="btnContinue">Go to Cobinar →</button>
    <button class="btn-signout" id="btnSignOut">Sign out</button>
  </div>

  <div class="card-footer">
    By signing in you agree to our
    <a href="/privacy">Privacy Policy</a> &amp; <a href="/terms">Terms</a>
  </div>
</div>

<!-- FIREBASE AUTH -->
<script type="module">
import { initializeApp }  from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js';
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey:            "AIzaSyAm4PyWfIUI0mnXn8uNE2L0cqwdV4PK5yE",
  authDomain:        "cobinar-prod.firebaseapp.com",
  projectId:         "cobinar-prod",
  storageBucket:     "cobinar-prod.firebasestorage.app",
  messagingSenderId: "1024793965812",
  appId:             "1:1024793965812:web:dca10146cfa30b4a165aa1",
  measurementId:     "G-MP7V7LZ8LE"
};

const CF_WORKER_URL = 'https://cobinar-auth.YOUR_SUBDOMAIN.workers.dev';

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);

const $ = id => document.getElementById(id);

// Where to redirect after login — respect ?from= param but never redirect back to /login
const _rawFrom = new URLSearchParams(location.search).get('from') || '/';
const redirect = _rawFrom.startsWith('/login') ? '/' : _rawFrom;

function showStatus(msg, type = 'info') {
  const el = $('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg ' + type;
  el.style.display = 'block';
}

// Check if email is admin via CF Worker
async function checkAdmin(email) {
  try {
    const r = await fetch(`${CF_WORKER_URL}/verify`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email})
    });
    const d = await r.json();
    if (d.success && d.token) {
      sessionStorage.setItem('cobinar-admin-token', d.token);
      sessionStorage.setItem('cobinar-admin-email', email);
      return true;
    }
    return false;
  } catch { return false; }
}

// Auth state listener
onAuthStateChanged(auth, async user => {
  if (user) {
    // Show logged-in view
    $('signInView').style.display = 'none';
    const li = $('loggedInView');
    li.style.display = 'flex';

    $('userName').textContent  = user.displayName || 'Cobinar User';
    $('userEmail').textContent = user.email;
    if (user.photoURL) {
      $('userAvatarImg').src = user.photoURL;
    } else {
      $('userAvatar').innerHTML = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
    }

    // Store uid/email for cross-page auth
    sessionStorage.setItem('cobinar-user-email', user.email);
    sessionStorage.setItem('cobinar-user-name',  user.displayName || '');
    sessionStorage.setItem('cobinar-user-photo', user.photoURL || '');
    sessionStorage.setItem('cobinar-user-uid',   user.uid);

    // ── Cross-page auth sync: persist to localStorage so all pages stay logged in ──
    try {
      localStorage.setItem('cobinar-user', JSON.stringify({
        email: user.email,
        name:  user.displayName || '',
        photo: user.photoURL    || '',
        uid:   user.uid         || '',
        ts:    Date.now()
      }));
    } catch(_) {}

    // Check admin
    const isAdmin = await checkAdmin(user.email);
    if (isAdmin) $('adminBadge').style.display = 'inline-flex';

    $('btnContinue').addEventListener('click', () => { location.href = redirect; });
    $('btnSignOut').addEventListener('click',  () => signOut(auth));

  } else {
    // Signed out
    sessionStorage.removeItem('cobinar-admin-token');
    sessionStorage.removeItem('cobinar-admin-email');
    sessionStorage.removeItem('cobinar-user-email');
    sessionStorage.removeItem('cobinar-user-uid');
    try { localStorage.removeItem('cobinar-user'); } catch(_) {}
    $('signInView').style.display = 'block';
    $('loggedInView').style.display = 'none';
  }
});

// Google sign-in
$('btnGoogle').addEventListener('click', async () => {
  $('btnGoogle').disabled = true;
  $('googleBtnText').innerHTML = '<span style="display:inline-flex;gap:8px;align-items:center"><span class="spinner" style="border:2px solid #ddd;border-top-color:#ff6a00;width:16px;height:16px;border-radius:50%;animation:spin .6s linear infinite;"></span> Signing in…</span>';
  try {
    await signInWithPopup(auth, new GoogleAuthProvider());
    // onAuthStateChanged handles the rest
  } catch(err) {
    $('btnGoogle').disabled = false;
    $('googleBtnText').textContent = 'Continue with Google';
    if (err.code !== 'auth/popup-closed-by-user') {
      showStatus('Sign-in failed: ' + (err.message || 'Unknown error'), 'error');
    }
  }
});

// Guest
$('btnGuest').addEventListener('click', () => { location.href = redirect; });
</script>
<style>
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</body>
</html>
